font-size="9" fill="#9ca3af">MEASURE</text><text x="520" y="226" font-size="9" fill="#9ca3af">SAVING/YR</text><text x="610" y="226" font-size="9" fill="#9ca3af">CAPEX</text><text x="676" y="226" font-size="9" fill="#9ca3af">PAYBACK</text><text x="756" y="226" font-size="9" fill="#9ca3af" text-anchor="end">CONF.</text><text x="64" y="246" font-size="10.5" fill="#374151">Re-tender retail energy contract</text><text x="560" y="246" font-size="10.5" text-anchor="end" fill="#111">$31,200</text><text x="640" y="246" font-size="10.5" text-anchor="end" fill="#6b7280">—</text><text x="712" y="246" font-size="10.5" text-anchor="end" fill="#6b7280">—</text><text x="756" y="246" font-size="10.5" text-anchor="end" fill="#6b7280">low</text><text x="64" y="268" font-size="10.5" fill="#374151">Install ~250 kWp solar</text><text x="560" y="268" font-size="10.5" text-anchor="end" fill="#111">$18,600</text><text x="640" y="268" font-size="10.5" text-anchor="end" fill="#6b7280">$250,000</text><text x="712" y="268" font-size="10.5" text-anchor="end" fill="#6b7280">13.4y</text><text x="756" y="268" font-size="10.5" text-anchor="end" fill="#6b7280">med</text><text x="64" y="290" font-size="10.5" fill="#374151">Correct power factor</text><text x="560" y="290" font-size="10.5" text-anchor="end" fill="#111">$5,900</text><text x="640" y="290" font-size="10.5" text-anchor="end" fill="#6b7280">$9,000</text><text x="712" y="290" font-size="10.5" text-anchor="end" fill="#6b7280">1.5y</text><text x="756" y="290" font-size="10.5" text-anchor="end" fill="#6b7280">med</text><text x="64" y="312" font-size="10.5" fill="#374151">Reduce out-of-hours / standing load</text><text x="560" y="312" font-size="10.5" text-anchor="end" fill="#111">$2,500</text><text x="640" y="312" font-size="10.5" text-anchor="end" fill="#6b7280">—</text><text x="712" y="312" font-size="10.5" text-anchor="end" fill="#6b7280">—</text><text x="756" y="312" font-size="10.5" text-anchor="end" fill="#6b7280">low</text><line x1="64" y1="324" x2="756" y2="324" stroke="#e5e7eb"/><text x="64" y="340" font-size="14" font-weight="700" fill="#111">Usage profile</text><rect x="64" y="352" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="74" y="368" font-size="8" letter-spacing="0.4" fill="#9ca3af">AVERAGE DEMAND</text><text x="74" y="388" font-size="15" font-weight="700" fill="#111">357 kW</text><rect x="237" y="352" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="247" y="368" font-size="8" letter-spacing="0.4" fill="#9ca3af">LOAD FACTOR</text><text x="247" y="388" font-size="15" font-weight="700" fill="#111">0.39</text><text x="247" y="400" font-size="8" fill="#9ca3af">flat-ish</text><rect x="410" y="352" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="420" y="368" font-size="8" letter-spacing="0.4" fill="#9ca3af">POWER FACTOR (AT PEAK)</text><text x="420" y="388" font-size="15" font-weight="700" fill="#111">1.00</text><rect x="583" y="352" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="593" y="368" font-size="8" letter-spacing="0.4" fill="#9ca3af">ESTIMATED DATA</text><text x="593" y="388" font-size="15" font-weight="700" fill="#111">0.0%</text><line x1="64" y1="424" x2="756" y2="424" stroke="#e5e7eb"/><text x="64" y="440" font-size="14" font-weight="700" fill="#111">Operational findings</text><rect x="64" y="452" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="74" y="468" font-size="8" letter-spacing="0.4" fill="#9ca3af">OVERNIGHT BASE LOAD</text><text x="74" y="488" font-size="15" font-weight="700" fill="#111">165 kW</text><text x="74" y="500" font-size="8" fill="#9ca3af">18% of peak</text><rect x="237" y="452" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="247" y="468" font-size="8" letter-spacing="0.4" fill="#9ca3af">OUT-OF-HOURS ENERGY</text><text x="247" y="488" font-size="15" font-weight="700" fill="#111">46%</text><rect x="410" y="452" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="420" y="468" font-size="8" letter-spacing="0.4" fill="#9ca3af">WEEKEND VS WEEKDAY</text><text x="420" y="488" font-size="15" font-weight="700" fill="#111">71% daily</text><rect x="583" y="452" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="593" y="468" font-size="8" letter-spacing="0.4" fill="#9ca3af">BASE-LOAD TREND</text><text x="593" y="488" font-size="15" font-weight="700" fill="#111">+3.2% f→l</text><text x="64" y="526" font-size="9.5" fill="#6b7280">Standing/overnight load and weekend running are usually the cheapest savings (controls/scheduling, no capital).</text><line x1="64" y1="540" x2="756" y2="540" stroke="#e5e7eb"/><text x="64" y="556" font-size="14" font-weight="700" fill="#111">Network tariff check</text><text x="64" y="574" font-size="10.5" fill="#374151">Modelled on Energex 7400 — lowest-cost of the tariffs assessed for this load.</text><text x="64" y="594" font-size="10.5" font-weight="600" fill="#111">Energex 7400 (current)</text><text x="756" y="594" font-size="10.5" text-anchor="end" fill="#111">$565,400/yr</text><text x="64" y="612" font-size="10.5" fill="#6b7280">Energex 7200</text><text x="756" y="612" font-size="10.5" text-anchor="end" fill="#6b7280">$612,800/yr</text><line x1="64" y1="632" x2="756" y2="632" stroke="#e5e7eb"/><text x="64" y="648" font-size="14" font-weight="700" fill="#111">Retail contract benchmark</text><text x="64" y="666" font-size="10.5" fill="#374151">Variable retail rate ~9.8¢/kWh vs indicative market benchmark ~8.6¢/kWh — re-tender worth ~$31,200/yr.</text><text x="64" y="684" font-size="9" fill="#9ca3af">Built from ASX QLD futures ($120/MWh) + margin/environmental/market/losses. Indicative; enter current futures per review.</text><line x1="64" y1="696" x2="756" y2="696" stroke="#e5e7eb"/><text x="64" y="712" font-size="14" font-weight="700" fill="#111">Demand management</text><text x="64" y="730" font-size="10.5" fill="#374151">Peak 916 kW at 2026-03-02 10:00 — inside the charged 9am–9pm window, so reducing it cuts the demand charge.</text><text x="64" y="752" font-size="10" fill="#6b7280">2026-03-02 10:00</text><text x="756" y="752" font-size="10" text-anchor="end" fill="#111">916 kW</text><text x="64" y="768" font-size="10" fill="#6b7280">2026-03-09 14:30</text><text x="756" y="768" font-size="10" text-anchor="end" fill="#111">902 kW</text><text x="64" y="784" font-size="10" fill="#6b7280">2026-03-16 11:00</text><text x="756" y="784" font-size="10" text-anchor="end" fill="#111">889 kW</text><line x1="64" y1="796" x2="756" y2="796" stroke="#e5e7eb"/><text x="64" y="812" font-size="14" font-weight="700" fill="#111">Power factor</text><text x="64" y="830" font-size="10.5" fill="#374151">PF at peak 0.96. Correcting to 0.95 gives little benefit; no correction warranted (already healthy).</text><line x1="64" y1="844" x2="756" y2="844" stroke="#e5e7eb"/><text x="64" y="860" font-size="14" font-weight="700" fill="#111">Solar opportunity</text><rect x="64" y="872" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="74" y="888" font-size="8" letter-spacing="0.4" fill="#9ca3af">RECOMMENDED SIZE</text><text x="74" y="908" font-size="15" font-weight="700" fill="#111">250 kWp</text><text x="74" y="920" font-size="8" fill="#9ca3af">best payback</text><rect x="237" y="872" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="247" y="888" font-size="8" letter-spacing="0.4" fill="#9ca3af">ANNUAL GENERATION</text><text x="247" y="908" font-size="15" font-weight="700" fill="#111">388 MWh</text><text x="247" y="920" font-size="8" fill="#9ca3af">94% self-consumed</text><rect x="410" y="872" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="420" y="888" font-size="8" letter-spacing="0.4" fill="#9ca3af">EST. ANNUAL SAVING</text><text x="420" y="908" font-size="15" font-weight="700" fill="#111">$18,600</text><text x="420" y="920" font-size="8" fill="#9ca3af">$320k over 25y</text><rect x="583" y="872" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="593" y="888" font-size="8" letter-spacing="0.4" fill="#9ca3af">SIMPLE PAYBACK</text><text x="593" y="908" font-size="15" font-weight="700" fill="#111">13.4 yrs</text><text x="593" y="920" font-size="8" fill="#9ca3af">~275 t CO₂/yr</text><text x="64" y="946" font-size="8.5" fill="#9ca3af">Indicative. 1,550 kWh/kWp/yr, ~$1.00/W, 0.5%/yr degradation, self-consumed kWh valued at $0.115/kWh.</text><line x1="64" y1="960" x2="756" y2="960" stroke="#e5e7eb"/><text x="64" y="976" font-size="14" font-weight="700" fill="#111">Emissions (Scope 2)</text><rect x="64" y="988" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="74" y="1004" font-size="8" letter-spacing="0.4" fill="#9ca3af">LOCATION-BASED</text><text x="74" y="1024" font-size="15" font-weight="700" fill="#111">2,221 t CO₂-e/yr</text><rect x="237" y="988" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="247" y="1004" font-size="8" letter-spacing="0.4" fill="#9ca3af">SOLAR OFFSET</text><text x="247" y="1024" font-size="15" font-weight="700" fill="#111">275 t CO₂-e/yr</text><rect x="410" y="988" width="160" height="54" rx="6" fill="#fff" stroke="#e5e7eb"/><text x="420" y="1004" font-size="8" letter-spacing="0.4" fill="#9ca3af">NGA FACTOR</text><text x="420" y="1024" font-size="15" font-weight="700" fill="#111">0.71 t/MWh</text><text x="420" y="1036" font-size="8" fill="#9ca3af">2024 (confirm)</text><text x="64" y="1062" font-size="8.5" fill="#9ca3af">Location-based using the NGA state factor. Market-based lower with GreenPower/LGCs/PPA. Confirm current NGA factor before issuing.</text><line x1="64" y1="1076" x2="756" y2="1076" stroke="#e5e7eb"/><text x="64" y="1092" font-size="14" font-weight="700" fill="#111">Basis &amp; assumptions</text><text x="64" y="1108" font-size="9" fill="#6b7280">• Costs modelled from interval meter data on Energex 7400 (network published; retail per Origin invoice), ex-GST.</text><text x="64" y="1123" font-size="9" fill="#6b7280">• Loss factors MLF 1.0106 × DLF 1.0439. Retail energy peak window assumed 7am–9pm weekdays.</text><text x="64" y="1138" font-size="9" fill="#6b7280">• Savings are indicative, not quotes; capex and PF/solar sizing need site assessment.</text></svg>