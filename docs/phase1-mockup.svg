<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="940" viewBox="0 0 1240 940" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
  <rect width="1240" height="940" fill="#f4f4f5"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#171717">NEMS Insight — Phase 1 operator console (mockup)</text>
  <text x="32" y="64" font-size="13" fill="#71717a">Visual approximation of the built screens. Sample data from supabase/seed/seed.sql.</text>

  <!-- ===================== 1. LOGIN ===================== -->
  <g transform="translate(32,90)">
    <rect width="560" height="380" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="24" y="34" font-size="12" font-weight="600" fill="#a1a1aa">1 · /login</text>
    <g transform="translate(150,90)">
      <text x="0" y="0" font-size="22" font-weight="700" fill="#171717">NEMS Insight</text>
      <text x="0" y="22" font-size="13" fill="#a1a1aa">Operator sign in</text>

      <text x="0" y="64" font-size="12" fill="#52525b">Email</text>
      <rect x="0" y="74" width="260" height="38" rx="6" fill="#fff" stroke="#d4d4d8"/>
      <text x="12" y="98" font-size="13" fill="#3f3f46">info@nems.au</text>

      <text x="0" y="140" font-size="12" fill="#52525b">Password</text>
      <rect x="0" y="150" width="260" height="38" rx="6" fill="#fff" stroke="#d4d4d8"/>
      <text x="12" y="174" font-size="14" fill="#3f3f46">••••••••••</text>

      <rect x="0" y="208" width="260" height="40" rx="6" fill="#171717"/>
      <text x="130" y="233" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Sign in</text>
    </g>
  </g>

  <!-- ===================== 2. CLIENTS LIST ===================== -->
  <g transform="translate(632,90)">
    <rect width="576" height="380" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="24" y="34" font-size="12" font-weight="600" fill="#a1a1aa">2 · /  (Clients)</text>
    <!-- header bar -->
    <line x1="0" y1="50" x2="576" y2="50" stroke="#ededf0"/>
    <text x="24" y="76" font-size="15" font-weight="700" fill="#171717">NEMS Insight</text>
    <text x="416" y="76" font-size="12" fill="#a1a1aa">info@nems.au</text>
    <text x="510" y="76" font-size="12" fill="#3f3f46" text-decoration="underline">Sign out</text>
    <line x1="0" y1="92" x2="576" y2="92" stroke="#ededf0"/>

    <text x="24" y="124" font-size="17" font-weight="700" fill="#171717">Clients</text>
    <text x="24" y="144" font-size="12" fill="#a1a1aa">Your portfolio of customer businesses.</text>

    <!-- client row -->
    <rect x="24" y="158" width="528" height="46" rx="8" fill="#fff" stroke="#e4e4e7"/>
    <text x="40" y="186" font-size="14" fill="#171717">Acme Manufacturing Pty Ltd</text>
    <text x="536" y="186" font-size="11" font-weight="600" fill="#a1a1aa" text-anchor="end" letter-spacing="0.5">ACTIVE</text>

    <!-- new client form -->
    <rect x="24" y="222" width="528" height="134" rx="8" fill="#fafafa" stroke="#e4e4e7"/>
    <text x="40" y="248" font-size="13" font-weight="600" fill="#3f3f46">New client</text>
    <rect x="40" y="260" width="300" height="32" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="52" y="281" font-size="12" fill="#a1a1aa">Business name</text>
    <rect x="40" y="300" width="160" height="30" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="52" y="320" font-size="12" fill="#a1a1aa">ABN (optional)</text>
    <rect x="384" y="300" width="120" height="30" rx="6" fill="#171717"/>
    <text x="444" y="320" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Add client</text>
  </g>

  <!-- ===================== 3. CLIENT DETAIL (SITES) ===================== -->
  <g transform="translate(32,500)">
    <rect width="560" height="400" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="24" y="34" font-size="12" font-weight="600" fill="#a1a1aa">3 · /clients/[id]  (Sites)</text>
    <line x1="0" y1="50" x2="560" y2="50" stroke="#ededf0"/>

    <text x="24" y="78" font-size="11" fill="#a1a1aa">Clients / <tspan fill="#52525b">Acme Manufacturing Pty Ltd</tspan></text>
    <text x="24" y="104" font-size="16" font-weight="700" fill="#171717">Acme Manufacturing Pty Ltd</text>
    <text x="24" y="123" font-size="11" fill="#a1a1aa">ABN 12 345 678 901 · active</text>

    <text x="24" y="152" font-size="13" font-weight="600" fill="#3f3f46">Sites</text>
    <rect x="24" y="162" width="512" height="44" rx="8" fill="#fff" stroke="#e4e4e7"/>
    <text x="40" y="189" font-size="14" fill="#171717">Acme Brisbane Plant</text>
    <text x="520" y="189" font-size="11" fill="#a1a1aa" text-anchor="end">Energex · QLD</text>

    <rect x="24" y="222" width="512" height="156" rx="8" fill="#fafafa" stroke="#e4e4e7"/>
    <text x="40" y="248" font-size="13" font-weight="600" fill="#3f3f46">New site</text>
    <rect x="40" y="260" width="480" height="30" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="52" y="280" font-size="12" fill="#a1a1aa">Site name</text>
    <rect x="40" y="298" width="480" height="30" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="52" y="318" font-size="12" fill="#a1a1aa">Address (optional)</text>
    <rect x="40" y="336" width="120" height="30" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="52" y="356" font-size="12" fill="#a1a1aa">State</text>
    <rect x="168" y="336" width="240" height="30" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="180" y="356" font-size="12" fill="#a1a1aa">Network/DNSP</text>
    <rect x="420" y="336" width="100" height="30" rx="6" fill="#171717"/>
    <text x="470" y="356" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Add site</text>
  </g>

  <!-- ===================== 4. SITE DETAIL (NMIs) ===================== -->
  <g transform="translate(632,500)">
    <rect width="576" height="400" rx="10" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="24" y="34" font-size="12" font-weight="600" fill="#a1a1aa">4 · /sites/[id]  (Metering points)</text>
    <line x1="0" y1="50" x2="576" y2="50" stroke="#ededf0"/>

    <text x="24" y="78" font-size="11" fill="#a1a1aa">Clients / Acme Manufacturing Pty Ltd / <tspan fill="#52525b">Acme Brisbane Plant</tspan></text>
    <text x="24" y="104" font-size="16" font-weight="700" fill="#171717">Acme Brisbane Plant</text>
    <text x="24" y="123" font-size="11" fill="#a1a1aa">10 Factory Rd, Brisbane QLD 4000 · Energex · QLD</text>

    <text x="24" y="152" font-size="13" font-weight="600" fill="#3f3f46">Metering points (NMIs)</text>
    <rect x="24" y="162" width="528" height="44" rx="8" fill="#fff" stroke="#e4e4e7"/>
    <text x="40" y="189" font-size="14" font-family="ui-monospace, monospace" fill="#171717">31000000000</text>
    <text x="536" y="189" font-size="11" fill="#a1a1aa" text-anchor="end">nmi_parent</text>

    <rect x="24" y="222" width="528" height="120" rx="8" fill="#fafafa" stroke="#e4e4e7"/>
    <text x="40" y="248" font-size="13" font-weight="600" fill="#3f3f46">New metering point</text>
    <rect x="40" y="260" width="496" height="32" rx="6" fill="#fff" stroke="#d4d4d8"/>
    <text x="52" y="281" font-size="12" font-family="ui-monospace, monospace" fill="#a1a1aa">NMI (e.g. 31000000000)</text>
    <rect x="40" y="302" width="110" height="30" rx="6" fill="#171717"/>
    <text x="95" y="322" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Add NMI</text>

    <text x="24" y="372" font-size="11" fill="#a1a1aa">Drill path: Client → Site → NMI. Interval data attaches here in Phase 2.</text>
  </g>
</svg>
