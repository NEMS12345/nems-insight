<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1468" viewBox="0 0 820 1468" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"><rect width="820" height="9999" fill="#F8FAFC"/><text x="44" y="40" font-size="11" font-weight="400" fill="#64748B"  >Energy review — NEMS Insight</text><text x="44" y="66" font-size="22" font-weight="700" fill="#0F172A"  >Industrial Warehouse</text><text x="44" y="86" font-size="11" font-weight="400" fill="#64748B"  >NMI 6123456789 · 2024-07-01 to 2025-06-30</text><rect x="636" y="46" width="140" height="30" rx="6" fill="#2357D7"/><text x="706" y="66" font-size="11" font-weight="600" fill="#fff" text-anchor="middle" >Print / Save as PDF</text><line x1="44" y1="114" x2="776" y2="114" stroke="#E2E8F0"/><text x="44" y="130" font-size="15" font-weight="700" fill="#0F172A"  >Summary</text><rect x="44" y="142" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="56" y="159" font-size="8.5" font-weight="400" fill="#94A3B8"  >ANNUAL COST</text><text x="56" y="180" font-size="16" font-weight="700" fill="#0F172A"  >$147,796</text><rect x="227" y="142" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="239" y="159" font-size="8.5" font-weight="400" fill="#94A3B8"  >ANNUAL CONSUMPTION</text><text x="239" y="180" font-size="16" font-weight="700" fill="#0F172A"  >826.7 MWh</text><rect x="410" y="142" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="422" y="159" font-size="8.5" font-weight="400" fill="#94A3B8"  >PEAK DEMAND</text><text x="422" y="180" font-size="16" font-weight="700" fill="#0F172A"  >292 kW</text><rect x="593" y="142" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="605" y="159" font-size="8.5" font-weight="400" fill="#94A3B8"  >IDENTIFIED SAVINGS</text><text x="605" y="180" font-size="16" font-weight="700" fill="#0F172A"  >$17,471/yr</text><text x="44" y="226" font-size="9" font-weight="400" fill="#64748B"  >Data window 2024-07-01 to 2025-06-30 (365 days, full year). Sequence: operational + tariff/retail first (0–30d), power factor + demand (30–60), solar (60–90); re-baseline to verify.</text><text x="44" y="248" font-size="8.5" font-weight="400" fill="#94A3B8"  >MEASURE</text><text x="560" y="248" font-size="8.5" font-weight="400" fill="#94A3B8" text-anchor="end" >SAVING/YR</text><text x="650" y="248" font-size="8.5" font-weight="400" fill="#94A3B8" text-anchor="end" >CAPEX</text><text x="715" y="248" font-size="8.5" font-weight="400" fill="#94A3B8" text-anchor="end" >PAYBACK</text><text x="776" y="248" font-size="8.5" font-weight="400" fill="#94A3B8" text-anchor="end" >CONF</text><text x="44" y="268" font-size="11" font-weight="400" fill="#0F172A"  >Reduce avoidable out-of-hours / standing load</text><text x="560" y="268" font-size="11" font-weight="400" fill="#0F172A" text-anchor="end" >$12,847</text><text x="650" y="268" font-size="11" font-weight="400" fill="#64748B" text-anchor="end" >—</text><text x="715" y="268" font-size="11" font-weight="400" fill="#64748B" text-anchor="end" >—</text><text x="776" y="268" font-size="11" font-weight="400" fill="#64748B" text-anchor="end" >medium</text><text x="44" y="288" font-size="11" font-weight="400" fill="#0F172A"  >Install ~29 kWp solar</text><text x="560" y="288" font-size="11" font-weight="400" fill="#0F172A" text-anchor="end" >$4,624</text><text x="650" y="288" font-size="11" font-weight="400" fill="#64748B" text-anchor="end" >$29,000</text><text x="715" y="288" font-size="11" font-weight="400" fill="#64748B" text-anchor="end" >6.3y</text><text x="776" y="288" font-size="11" font-weight="400" fill="#64748B" text-anchor="end" >medium</text><line x1="44" y1="320" x2="776" y2="320" stroke="#E2E8F0"/><text x="44" y="336" font-size="15" font-weight="700" fill="#0F172A"  >Usage profile</text><rect x="44" y="348" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="56" y="365" font-size="8.5" fo