height="15.0" fill="#2357D7"/><rect x="685.5" y="492.7" width="13.3" height="13.3" fill="#2357D7"/><rect x="700.8" y="492.5" width="13.3" height="13.5" fill="#2357D7"/><rect x="716.0" y="490.6" width="13.3" height="15.4" fill="#2357D7"/><rect x="731.3" y="488.8" width="13.3" height="17.2" fill="#2357D7"/><rect x="746.5" y="488.7" width="13.3" height="17.3" fill="#2357D7"/><rect x="761.8" y="490.4" width="13.3" height="15.6" fill="#2357D7"/><text x="44" y="522" font-size="8" font-weight="400" fill="#94A3B8"  >00:00</text><text x="227" y="522" font-size="8" font-weight="400" fill="#94A3B8"  >06:00</text><text x="410" y="522" font-size="8" font-weight="400" fill="#94A3B8"  >12:00</text><text x="593" y="522" font-size="8" font-weight="400" fill="#94A3B8"  >18:00</text><line x1="44" y1="542" x2="776" y2="542" stroke="#E2E8F0"/><text x="44" y="558" font-size="15" font-weight="700" fill="#0F172A"  >Operational findings</text><rect x="44" y="570" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="56" y="587" font-size="8.5" font-weight="400" fill="#94A3B8"  >OVERNIGHT BASE LOAD</text><text x="56" y="608" font-size="16" font-weight="700" fill="#0F172A"  >45 kW</text><rect x="227" y="570" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="239" y="587" font-size="8.5" font-weight="400" fill="#94A3B8"  >AVOIDABLE (EST.)</text><text x="239" y="608" font-size="16" font-weight="700" fill="#0F172A"  >18 kW</text><text x="239" y="621" font-size="8.5" font-weight="400" fill="#64748B"  >$12,847/yr</text><rect x="410" y="570" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="422" y="587" font-size="8.5" font-weight="400" fill="#94A3B8"  >OUT-OF-HOURS ENERGY</text><text x="422" y="608" font-size="16" font-weight="700" fill="#0F172A"  >37%</text><rect x="593" y="570" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="605" y="587" font-size="8.5" font-weight="400" fill="#94A3B8"  >WEEKEND VS WEEKDAY</text><text x="605" y="608" font-size="16" font-weight="700" fill="#0F172A"  >38%</text><text x="44" y="654" font-size="9" font-weight="400" fill="#64748B"  >Only the avoidable portion is dollarised (observed minus an essential floor), valued at off-peak. Investigate — site confirmation needed.</text><line x1="44" y1="670" x2="776" y2="670" stroke="#E2E8F0"/><text x="44" y="686" font-size="15" font-weight="700" fill="#0F172A"  >Where the money goes</text><text x="44" y="700" font-size="10.5" font-weight="400" fill="#0F172A"  >Network fixed charge  [network]</text><text x="776" y="700" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$3,379</text><text x="44" y="717" font-size="10.5" font-weight="400" fill="#0F172A"  >Network energy (peak)  [network]</text><text x="776" y="717" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$1,553</text><text x="44" y="734" font-size="10.5" font-weight="400" fill="#0F172A"  >Network energy (shoulder)  [network]</text><text x="776" y="734" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$18,509</text><text x="44" y="751" font-size="10.5" font-weight="400" fill="#0F172A"  >Network energy (off-peak)  [network]</text><text x="776" y="751" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$1,885</text><text x="44" y="768" font-size="10.5" font-weight="400" fill="#0F172A"  >Network demand (peak)  [network]</text><text x="776" y="768" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$34,551</text><text x="44" y="785" font-size="10.5" font-weight="400" fill="#0F172A"  >Network demand (shoulder)  [network]</text><text x="776" y="785" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$11,390</text><text x="44" y="802" font-size="10.5" font-weight="400" fill="#0F172A"  >Retail energy (peak)  [retail]</text><text x="776" y="802" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$42,093</text><text x="44" y="819" font-size="10.5" font-weight="400" fill="#0F172A"  >Retail energy (off-peak)  [retail]</text><text x="776" y="819" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$23,285</text><text x="44" y="836" font-size="10.5" font-weight="400" fill="#0F172A"  >Environmental (SREC + LREC)  [retail]</text><text x="776" y="836" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$8,917</text><text x="44" y="853" font-size="10.5" font-weight="400" fill="#0F172A"  >Regulated / market (AEMO)  [retail]</text><text x="776" y="853" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$1,042</text><text x="44" y="870" font-size="10.5" font-weight="400" fill="#0F172A"  >Retail supply  [retail]</text><text x="776" y="870" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$12</text><text x="44" y="887" font-size="10.5" font-weight="400" fill="#0F172A"  >Metering  [retail]</text><text x="776" y="887" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$1,180</text><line x1="44" y1="894" x2="776" y2="894" stroke="#E2E8F0"/><text x="44" y="910" font-size="11" font-weight="700" fill="#0F172A"  >Network $71,266 · Retail $76,530</text><text x="776" y="910" font-size="13" font-weight="700" fill="#0F172A" text-anchor="end" >$147,796</text><line x1="44" y1="932" x2="776" y2="932" stroke="#E2E8F0"/><text x="44" y="948" font-size="15" font-weight="700" fill="#0F172A"  >Network tariff check</text><text x="44" y="964" font-size="10.5" font-weight="400" fill="#0F172A"  >Modelled on Energex 7200 — lowest-cost of the tariffs assessed for this load.</text><text x="44" y="986" font-size="10.5" font-weight="700" fill="#0F172A"  >Energex 7200 (SAC Large TOU) (current)</text><text x="776" y="986" font-size="10.5" font-weight="400" fill="#0F172A" text-anchor="end" >$71,266/yr network</text><text x="44" y="1003" font-size="10.5" font-weight="400" fill="#64748B"  >Energex 7400 (11kV TOU Demand)</text><text x="776" y="1003" font-size="10.5" font-weight="400" fill="#64748B" text-anchor="end" >$76,237/yr network</text><line x1="44" y1="1018" x2="776" y2="1018" stroke="#E2E8F0"/><text x="44" y="1034" font-size="15" font-weight="700" fill="#0F172A"  >Retail contract benchmark</text><text x="44" y="1050" font-size="10.5" font-weight="400" fill="#0F172A"  >Variable retail rate ~9.11¢/kWh vs benchmark band 14.1–17.3¢/kWh — broadly competitive.</text><text x="44" y="1068" font-size="8.5" font-weight="400" fill="#94A3B8"  >Contestable retail component only; from ASX QLD futures $120/MWh grossed up for losses + load shape, plus LGC/STC, market fees, margin. A band, not a quote.</text><line x1="44" y1="1084" x2="776" y2="1084" stroke="#E2E8F0"/><text x="44" y="1100" font-size="15" font-weight="700" fill="#0F172A"  >Demand management</text><text x="44" y="1116" font-size="10.5" font-weight="400" fill="#0F172A"  >Peak 292 kW at 2025-01-23 09:30 — inside the charged window. Theoretical monthly-shave headroom ~$656/yr (kW).</text><text x="44" y="1134" font-size="8.5" font-weight="400" fill="#94A3B8"  >Interventions cheapest-first: operational (stagger start-ups, BMS, demand limiting) → load-shift → peak-shave (battery/genset).</text><line x1="44" y1="1146" x2="776" y2="1146" stroke="#E2E8F0"/><text x="44" y="1162" font-size="15" font-weight="700" fill="#0F172A"  >Power factor</text><text x="44" y="1178" font-size="10.5" font-weight="400" fill="#0F172A"  >Demand is billed on kW — correcting power factor does not change the demand charge. No action (would matter on a kVA tariff).</text><line x1="44" y1="1196" x2="776" y2="1196" stroke="#E2E8F0"/><text x="44" y="1212" font-size="15" font-weight="700" fill="#0F172A"  >Solar opportunity</text><rect x="44" y="1224" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="56" y="1241" font-size="8.5" font-weight="400" fill="#94A3B8"  >BEST PAYBACK</text><text x="56" y="1262" font-size="16" font-weight="700" fill="#0F172A"  >29 kWp</text><text x="56" y="1275" font-size="8.5" font-weight="400" fill="#64748B"  >6.3y · 100% self</text><rect x="227" y="1224" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="239" y="1241" font-size="8.5" font-weight="400" fill="#94A3B8"  >BEST LIFETIME VALUE</text><text x="239" y="1262" font-size="16" font-weight="700" fill="#0F172A"  >174 kWp</text><text x="239" y="1275" font-size="8.5" font-weight="400" fill="#64748B"  >$541,423 / 25y</text><rect x="410" y="1224" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="422" y="1241" font-size="8.5" font-weight="400" fill="#94A3B8"  >ANNUAL SAVING</text><text x="422" y="1262" font-size="16" font-weight="700" fill="#0F172A"  >$4,624</text><rect x="593" y="1224" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="605" y="1241" font-size="8.5" font-weight="400" fill="#94A3B8"  >CO₂ AVOIDED</text><text x="605" y="1262" font-size="16" font-weight="700" fill="#0F172A"  >~32 t/yr</text><text x="44" y="1308" font-size="8.5" font-weight="400" fill="#94A3B8"  >Two sizes: min-payback (cash-constrained) and max-lifetime-value (asset owner). 1,550 kWh/kWp/yr, ~$1.00/W, 0.5%/yr degradation, inverter replacement ~yr 11.</text><line x1="44" y1="1324" x2="776" y2="1324" stroke="#E2E8F0"/><text x="44" y="1340" font-size="15" font-weight="700" fill="#0F172A"  >Electricity emissions</text><rect x="44" y="1352" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="56" y="1369" font-size="8.5" font-weight="400" fill="#94A3B8"  >SCOPE 2 (LOCATION)</text><text x="56" y="1390" font-size="16" font-weight="700" fill="#0F172A"  >587 t/yr</text><text x="56" y="1403" font-size="8.5" font-weight="400" fill="#64748B"  >0.71 t/MWh</text><rect x="227" y="1352" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="239" y="1369" font-size="8.5" font-weight="400" fill="#94A3B8"  >SCOPE 2 (MARKET)</text><text x="239" y="1390" font-size="16" font-weight="700" fill="#0F172A"  >587 t/yr</text><rect x="410" y="1352" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="422" y="1369" font-size="8.5" font-weight="400" fill="#94A3B8"  >SCOPE 3 (T&amp;D+UP)</text><text x="422" y="1390" font-size="16" font-weight="700" fill="#0F172A"  >91 t/yr</text><rect x="593" y="1352" width="170" height="58" rx="6" fill="#FFFFFF" stroke="#E2E8F0"/><text x="605" y="1369" font-size="8.5" font-weight="400" fill="#94A3B8"  >SOLAR OFFSET</text><text x="605" y="1390" font-size="16" font-weight="700" fill="#0F172A"  >~32 t/yr</text><text x="44" y="1436" font-size="8.5" font-weight="400" fill="#94A3B8"  >Method-stated estimates (NGA factors), electricity only — not a "carbon-neutral" claim. Ladder: efficiency → solar → PPA/GreenPower → offsets.</text></svg>